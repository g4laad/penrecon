{% extends "base.html" %}
{% import "_icons.html" as icons %}
{% block title %}Credentials — penrecon{% endblock %}
{% block content %}
<div class="page-head"><h1>Credentials</h1></div>

<form class="filters cred-add" hx-post="/credentials" hx-target="#cred-list" hx-swap="innerHTML">
  <label class="field"><span>kind</span>
    <select name="kind">{% for k in kinds %}<option value="{{ k.value }}">{{ k.value }}</option>{% endfor %}</select></label>
  <label class="field"><span>username</span>
    <input name="username" class="mono" autocomplete="off" placeholder="admin"></label>
  <label class="field"><span>secret</span>
    <input name="secret" class="mono" autocomplete="off" placeholder="password / hash / key"></label>
  <label class="field"><span>notes</span>
    <input name="notes" placeholder="where / how found"></label>
  <button type="submit">{{ icons.icon('plus') }}Add credential</button>
</form>

<div id="cred-list">
  {% include "_credentials.html" %}
</div>
<script>
  // reset the add form only after a successful create (keeps input on error)
  const addForm = document.querySelector('.cred-add');
  addForm.addEventListener('htmx:afterRequest', (e) => { if (e.detail.successful) addForm.reset(); });
</script>
{% endblock %}
