{% extends "base.html" %}
{% block title %}Hosts — penrecon{% endblock %}
{% import "_icons.html" as icons %}
{% block content %}
<div class="page-head">
  <h1>Hosts</h1>
  <div class="page-head-actions">
    <a class="button" href="/export/hosts.csv" download>{{ icons.icon('download') }}Export CSV</a>
    <button type="button" class="primary" id="new-host-open">{{ icons.icon('plus') }}New host</button>
  </div>
</div>
<dialog id="new-host-dialog" class="modal" aria-labelledby="new-host-title">
  <form action="/hosts" method="post" class="modal-form">
    <h2 id="new-host-title">New host</h2>
    <label class="field"><span>IP address</span>
      <input name="ip" placeholder="10.0.0.5" required aria-label="New host IP" class="mono" autocomplete="off" data-ip></label>
    <div class="modal-actions">
      <button type="submit" formmethod="dialog" formnovalidate value="cancel" class="modal-cancel">Cancel</button>
      <button type="submit" class="primary">{{ icons.icon('plus') }}Add host</button>
    </div>
  </form>
</dialog>
<form class="filters" role="search" hx-get="/" hx-target="#host-table" hx-push-url="true"
      hx-swap="innerHTML transition:true swap:120ms"
      hx-trigger="submit">
  <label class="field"><span>search</span>
    <span class="input-icon">{{ icons.icon('search') }}<input type="search" name="q" value="{{ q }}" placeholder="ip / hostname / service"></span></label>
  <label class="field"><span>port</span>
    <input type="number" name="port" value="{{ port or '' }}" placeholder="any"></label>
  <label class="field"><span>tag</span>
    <input type="text" name="tag" value="{{ tag }}" placeholder="any"></label>
  <label class="field"><span>status</span>
    <select name="status">
      <option value="">any</option>
      {% for s in statuses %}<option value="{{ s.value }}" {{ 'selected' if status==s.value }}>{{ s.value }}</option>{% endfor %}
    </select></label>
  <label class="field"><span>change</span>
    <select name="change">
      <option value="">any</option>
      <option value="new" {{ 'selected' if change=='new' }}>new</option>
      <option value="changed" {{ 'selected' if change=='changed' }}>changed</option>
      <option value="unchanged" {{ 'selected' if change=='unchanged' }}>unchanged</option>
    </select></label>
  <input type="hidden" name="sort" value="{{ sort }}">
  <input type="hidden" name="dir" value="{{ direction }}">{# hidden so a filter submit keeps the active sort #}
  <button type="submit">{{ icons.icon('filter') }}Apply</button>
</form>
<p id="filter-status" class="visually-hidden" role="status" aria-live="polite"></p>
<div id="host-table">
  {% include "_host_table.html" %}
</div>
<script>
  // "/" focuses search (unless already typing); afterSwap announces just the count
  const search = document.querySelector('.filters input[name="q"]');
  addEventListener('keydown', (e) => {
    const t = document.activeElement && document.activeElement.tagName;
    if (e.key === '/' && t !== 'INPUT' && t !== 'TEXTAREA' && t !== 'SELECT') {
      e.preventDefault();
      if (search) search.focus();
    }
  });
  // new-host modal: native <dialog>. showModal() gives focus-trap + Esc + backdrop.
  // Cancel closes natively via formmethod="dialog"; here we add open + click-outside.
  const dialog = document.getElementById('new-host-dialog');
  document.getElementById('new-host-open').addEventListener('click', () => {
    const ip = dialog.querySelector('input[name="ip"]');
    ip.value = '';                                  // fresh each open
    ip.dispatchEvent(new Event('input'));           // clear any stale validity
    dialog.showModal();
  });
  dialog.addEventListener('click', (e) => {          // click on the backdrop (outside the form) closes
    if (e.target === dialog) dialog.close();
  });

  const status = document.getElementById('filter-status');
  const filters = document.querySelector('.filters');
  document.body.addEventListener('htmx:afterSwap', (e) => {
    if (e.target.id !== 'host-table') return;
    if (status) {
      const count = e.target.querySelector('.count');
      status.textContent = count ? count.textContent.trim() : '';
    }
    // header-sort clicks swap only the table; mirror the active sort back into the
    // filter form's hidden inputs so a later filter submit doesn't reset it
    const table = e.target.querySelector('table');
    if (table && filters) {
      filters.sort.value = table.dataset.sort || 'ip';
      filters.dir.value = table.dataset.dir || '';
    }
  });
</script>
{% endblock %}
