{% extends "base.html" %}
{% block title %}Hosts — penrecon{% endblock %}
{% block content %}
<div class="page-head">
  <h1>Hosts</h1>
  <form class="new-host" action="/hosts" method="post">
    <input name="ip" placeholder="10.0.0.0" required aria-label="New host IP" class="mono">
    <button type="submit">+ New host</button>
  </form>
</div>
<form class="filters" role="search" hx-get="/" hx-target="#host-table" hx-push-url="true"
      hx-swap="innerHTML transition:true swap:120ms"
      hx-trigger="submit, change from:.filters select">
  <input type="search" name="q" value="{{ q }}" placeholder="ip / hostname / service" aria-label="Search by IP, hostname, or service">
  <input type="number" name="port" value="{{ port or '' }}" placeholder="port" aria-label="Filter by open port">
  <input type="text" name="tag" value="{{ tag }}" placeholder="tag" aria-label="Filter by tag">
  <select name="status" aria-label="Filter by status">
    <option value="">any status</option>
    {% for s in statuses %}<option value="{{ s.value }}" {{ 'selected' if status==s.value }}>{{ s.value }}</option>{% endfor %}
  </select>
  <select name="sort" aria-label="Sort hosts by">
    <option value="ip" {{ 'selected' if sort=='ip' }}>sort: IP</option>
    <option value="ports" {{ 'selected' if sort=='ports' }}>sort: most ports</option>
    <option value="status" {{ 'selected' if sort=='status' }}>sort: status</option>
  </select>
  <button type="submit">Apply</button>
</form>
<div id="host-table" aria-live="polite" aria-atomic="true">
  {% include "_host_table.html" %}
</div>
{% endblock %}
