{% import "_icons.html" as icons %}
<form class="annotation" hx-post="/annotation" hx-target="this" hx-swap="outerHTML">
  <input type="hidden" name="target_type" value="{{ tt }}">
  <input type="hidden" name="target_id" value="{{ tid }}">
  <div class="ann-row">
    <label class="field"><span>status</span>
      <select name="status">
        {% for s in statuses %}<option value="{{ s.value }}" {{ 'selected' if ann and ann.status==s.value }}>{{ s.value }}</option>{% endfor %}
      </select></label>
    <label class="field ann-tags"><span>tags</span>
      <input type="text" name="tags" placeholder="comma,separated" value="{{ (ann.tags | join(', ')) if ann else '' }}"></label>
  </div>
  <div class="ann-actions">
    <button type="submit">Save</button>
    {% if saved %}<span class="saved">{{ icons.icon('new', 'icon-sm') }}saved</span>{% endif %}
  </div>
</form>
